<?xml version="1.0" encoding="UTF-8"?>
<!--
  owning agent: design-lead
  Area 1 Stage 3 (cave) mid-distance parallax layer (Phase 3, v0.75.1). Scroll factor 0.3.
  Deeper cave wall surface with distant mineral deposits — vertical bands of
  wet-cave-stone with sparse amber-vein striations and crystalline highlights.
  Tileable horizontally — the deposit pattern is symmetric across the canvas.
  Colors come from the Phase 3 cave tileset family (`palette-phase3.md`).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 576" width="768" height="576" preserveAspectRatio="xMidYMid slice" shape-rendering="crispEdges">
  <!-- Deep cave wall band: fills the middle-to-lower vertical extent. -->
  <rect x="0" y="280" width="768" height="296" fill="#4a5860"/>

  <!-- Cave wall mid-shade — a slightly warmer cousin sitting in front. -->
  <rect x="0" y="360" width="768" height="216" fill="#6a7878" opacity="0.65"/>

  <!-- Distant mineral deposit columns — soft vertical stripes in cave-stone
       catchlight. Spaced ~110px apart so the pattern tiles cleanly. -->
  <g fill="#c8d4c8" opacity="0.25">
    <rect x="60"  y="280" width="2" height="180"/>
    <rect x="180" y="280" width="2" height="200"/>
    <rect x="300" y="280" width="2" height="180"/>
    <rect x="420" y="280" width="2" height="220"/>
    <rect x="540" y="280" width="2" height="180"/>
    <rect x="660" y="280" width="2" height="200"/>
  </g>

  <!-- Amber-vein striations — sparse warm threads running through the wall.
       These echo the crystal_vein hazard tile from the cave tileset. -->
  <g stroke="#e8a040" stroke-width="1" fill="none" opacity="0.55">
    <path d="M 100,300 Q 120,380 110,460"/>
    <path d="M 260,310 Q 280,400 270,470"/>
    <path d="M 460,300 Q 480,380 470,460"/>
    <path d="M 620,310 Q 640,400 630,470"/>
  </g>
  <!-- A few brighter peak-amber pinpoints in the veins -->
  <g fill="#f8d878" opacity="0.75">
    <circle cx="115" cy="360" r="1.5"/>
    <circle cx="275" cy="370" r="1.5"/>
    <circle cx="475" cy="360" r="1.5"/>
    <circle cx="635" cy="370" r="1.5"/>
  </g>

  <!-- Distant cave-stone outcrops sitting at the base — soft rounded humps
       that read as cave-floor stones receding into the depth. -->
  <g fill="#7a8088" opacity="0.50">
    <ellipse cx="80"  cy="475" rx="58" ry="14"/>
    <ellipse cx="220" cy="478" rx="62" ry="16"/>
    <ellipse cx="360" cy="475" rx="56" ry="14"/>
    <ellipse cx="500" cy="478" rx="64" ry="16"/>
    <ellipse cx="640" cy="475" rx="58" ry="14"/>
  </g>

  <!-- Cave-moss-blue-green sparse strands on the outcrops -->
  <g fill="#3a5e58" opacity="0.55">
    <ellipse cx="80"  cy="468" rx="40" ry="3"/>
    <ellipse cx="360" cy="468" rx="38" ry="3"/>
    <ellipse cx="640" cy="468" rx="40" ry="3"/>
  </g>
</svg>

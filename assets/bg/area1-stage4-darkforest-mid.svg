<?xml version="1.0" encoding="UTF-8"?>
<!--
  owning agent: design-lead
  Area 1 Stage 4 (dark forest) mid-distance parallax layer (Phase 3, v0.75.1). Scroll factor 0.3.
  Distant twisted-trunk silhouettes against the deep canopy. The trunks lean
  slightly, suggesting age; a faint moonlight-silver rim catches the moonward
  side of each. The far-canopy fills the upper portion in dark-canopy blue-green.
  Tileable horizontally — trunk spacing is even, edge trunks half-cropped on
  both sides to interlock.
  Colors come from the Phase 3 dark-forest tileset family (`palette-phase3.md`).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 576" width="768" height="576" preserveAspectRatio="xMidYMid slice" shape-rendering="crispEdges">
  <!-- Far canopy band: a darker blue-green ridge across the upper-third of
       the layer. -->
  <path d="M 0,290
           L 60,278 L 110,290 L 160,275 L 220,290 L 280,278 L 340,290
           L 400,280 L 460,290 L 520,275 L 580,290 L 640,278 L 700,290 L 768,285
           L 768,400 L 0,400 Z"
        fill="#2a3a3a" opacity="0.85"/>

  <!-- Mid-canopy: lighter dark-canopy blue-green mid; sits in front. -->
  <path d="M 0,340
           L 50,328 L 110,345 L 170,335 L 240,348 L 310,335 L 380,346
           L 450,335 L 520,345 L 590,335 L 660,348 L 720,338 L 768,342
           L 768,576 L 0,576 Z"
        fill="#3e5a52" opacity="0.80"/>

  <!-- Twisted-trunk silhouettes — irregular wavy trunks rising from the
       canopy line. Drawn in canopy-shadow-violet for the deepest read. -->
  <g fill="#684e6e">
    <path d="M 40,400  Q 36,360 44,330  Q 50,310 46,290 L 56,290 Q 60,310 54,330 Q 50,360 56,400 Z"/>
    <path d="M 180,400 Q 174,360 188,335 Q 196,310 188,288 L 198,288 Q 206,310 200,335 Q 192,360 198,400 Z"/>
    <path d="M 320,400 Q 316,360 326,330 Q 332,305 324,282 L 334,282 Q 342,305 336,330 Q 332,360 338,400 Z"/>
    <path d="M 460,400 Q 454,360 468,335 Q 476,310 468,288 L 478,288 Q 486,310 480,335 Q 472,360 478,400 Z"/>
    <path d="M 600,400 Q 596,360 606,330 Q 612,305 604,282 L 614,282 Q 622,305 616,330 Q 612,360 618,400 Z"/>
    <path d="M 720,400 Q 714,360 728,335 Q 736,310 728,288 L 768,288 L 768,400 Z"/>
    <path d="M 0,400 L 0,288 L 14,288 Q 22,310 18,335 Q 14,360 18,400 Z"/>
  </g>

  <!-- Moonlight-silver rim along the moon-ward side of each trunk — thin
       vertical strokes catching the moonlight from above. -->
  <g stroke="#cfd8dc" stroke-width="1" fill="none" opacity="0.55">
    <path d="M 54,290 Q 50,330 56,400"/>
    <path d="M 196,288 Q 192,330 198,400"/>
    <path d="M 332,282 Q 332,330 338,400"/>
    <path d="M 476,288 Q 472,330 478,400"/>
    <path d="M 612,282 Q 612,330 618,400"/>
  </g>

  <!-- A few sparse pale-moss highlight clusters on the trunks (per the
       palette, `#5a8a4a` cairn-mantle moss — sparse, moonlit moss on dark
       rock and bark). -->
  <g fill="#5a8a4a" opacity="0.45">
    <ellipse cx="48"  cy="370" rx="4" ry="6"/>
    <ellipse cx="192" cy="365" rx="4" ry="6"/>
    <ellipse cx="330" cy="370" rx="4" ry="6"/>
    <ellipse cx="472" cy="365" rx="4" ry="6"/>
    <ellipse cx="610" cy="370" rx="4" ry="6"/>
  </g>
</svg>

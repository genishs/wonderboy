<?xml version="1.0" encoding="UTF-8"?>
<!--
  owning agent: design-lead
  Area 2 Stage 4 (the Reignward) sky parallax layer — full-sky with ruin
  visible below (scroll 0.0). Phase 4, v1.0. The summit-flat: the player can
  see the Verdant Ruin (Area 1's sunken bowl) far below at the horizon line,
  plus a single beacon-tower pedestal silhouette far away (the next ridge over).
  Wide open. Warm dawn-amber sky. Tileable horizontally.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 576" width="768" height="576" preserveAspectRatio="xMidYMid slice" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="reignwardSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.00" stop-color="#f8d878"/>
      <stop offset="0.30" stop-color="#e4b25c"/>
      <stop offset="0.60" stop-color="#bdb7a7"/>
      <stop offset="0.85" stop-color="#4a7c3a"/>
      <stop offset="1.00" stop-color="#2e5028"/>
    </linearGradient>
    <radialGradient id="ruinGlow" cx="0.55" cy="0.85" r="0.35">
      <stop offset="0.00" stop-color="#4a7c3a" stop-opacity="0.85"/>
      <stop offset="0.40" stop-color="#2e5028" stop-opacity="0.55"/>
      <stop offset="1.00" stop-color="#2e5028" stop-opacity="0.00"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="768" height="576" fill="url(#reignwardSky)"/>

  <!-- The Verdant Ruin visible far below (the sunken bowl that was Area 1).
       Reads as a soft green wash at the horizon — Reed sees where he came
       from for the first time. -->
  <rect x="0" y="380" width="768" height="200" fill="url(#ruinGlow)"/>

  <!-- The morning sun — high in the sky, brightly catching everything. -->
  <circle cx="384" cy="100" r="50" fill="#fff2c0"/>
  <circle cx="376" cy="92" r="20" fill="#ffffff" opacity="0.70"/>
  <circle cx="384" cy="100" r="80" fill="#f8d878" opacity="0.25"/>

  <!-- Far beacon-tower silhouette on the horizon (the "next ridge over").
       Very small, very far. -->
  <g fill="#3a2e4a" opacity="0.85">
    <rect x="650" y="335" width="3" height="38"/>
    <rect x="648" y="328" width="7" height="10"/>
    <rect x="649" y="320" width="5" height="10"/>
  </g>
  <circle cx="651" cy="324" r="2" fill="#e4b25c" opacity="0.85"/>

  <!-- A few sparse high-altitude embers in the sky — peaceful, drifting. -->
  <g fill="#e4b25c" opacity="0.60">
    <circle cx="180" cy="200" r="1.5"/>
    <circle cx="320" cy="250" r="1.5"/>
    <circle cx="540" cy="220" r="1.5"/>
    <circle cx="640" cy="270" r="1.5"/>
  </g>
</svg>

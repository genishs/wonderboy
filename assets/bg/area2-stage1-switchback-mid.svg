<?xml version="1.0" encoding="UTF-8"?>
<!--
  owning agent: design-lead
  Area 2 Stage 1 (the Switchback) mid parallax layer — distant cliffs (scroll 0.3).
  Phase 4, v1.0. Distant stone cliffs rising in the background, with a few
  small switchback paths visible as thin pale lines etched into the cliffs.
  Tileable horizontally.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 576" width="768" height="576" preserveAspectRatio="xMidYMid slice" shape-rendering="crispEdges">
  <!-- Far cliff ridge (dark stone-bone) -->
  <path d="M 0,320 L 50,280 L 110,310 L 170,260 L 250,290 L 320,250 L 390,300 L 460,250 L 540,290 L 610,260 L 680,295 L 740,265 L 768,280 L 768,460 L 0,460 Z"
        fill="#6a6457" opacity="0.85"/>

  <!-- Mid cliff ridge (stone-bone shadow, closer) -->
  <path d="M 0,400 L 60,370 L 120,400 L 200,360 L 280,400 L 360,365 L 440,400 L 520,365 L 600,400 L 680,370 L 768,400 L 768,576 L 0,576 Z"
        fill="#8e8878" opacity="0.85"/>

  <!-- Thin pale switchback path lines etched on the far cliffs (the player's
       memory of having climbed up here). -->
  <g stroke="#bdb7a7" stroke-width="2" fill="none" opacity="0.55">
    <path d="M 60,310 L 130,335 L 80,365 L 145,385 L 95,410"/>
    <path d="M 320,290 L 400,315 L 350,340 L 430,365 L 380,390"/>
    <path d="M 600,290 L 680,315 L 630,340 L 710,365 L 660,390"/>
  </g>

  <!-- A few small dawn-amber catch-lights where the morning sun strikes a
       crystal vein in the cliff (sparse, decorative). -->
  <g fill="#e4b25c" opacity="0.65">
    <circle cx="125" cy="320" r="2"/>
    <circle cx="395" cy="305" r="2"/>
    <circle cx="675" cy="305" r="2"/>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!--
  owning agent: design-lead
  Area 1 mid-distance parallax layer (Phase 2, v0.50). Scroll factor 0.3.
  Distant ridge / forest tree-canopy silhouette in cool layered greens, with two
  stylized ruin-stone silhouettes surfacing through the canopy line. Tileable
  horizontally — the left and right edges meet at the same canopy y-value.
  Per docs/briefs/phase2-areas.md §9.2 this layer fills ~50% of canvas height
  starting from below the sky's lower haze band.
  All colors come from the Phase 2 palette family (palette-phase2.md).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 576" width="768" height="576" preserveAspectRatio="xMidYMid slice" shape-rendering="crispEdges">
  <!-- Far ridge: coolest, palest green band. Sits at upper-canopy level. -->
  <path d="M 0,300
           L 60,290 L 110,300 L 160,285 L 220,300 L 280,288 L 340,300
           L 400,290 L 460,300 L 520,285 L 580,300 L 640,288 L 700,300 L 768,295
           L 768,400 L 0,400 Z"
        fill="#6e8868" opacity="0.65"/>

  <!-- Mid ridge: slightly warmer cool-green, lower. -->
  <path d="M 0,340
           L 50,330 L 110,345 L 170,335 L 240,348 L 310,335 L 380,346
           L 450,335 L 520,345 L 590,335 L 660,348 L 720,338 L 768,342
           L 768,576 L 0,576 Z"
        fill="#5a7858"/>

  <!-- Near treetops: tile-able rounded-blob canopy across the full width. Each
       blob uses the Phase 1 tunic moss-green so the canopy reads consistent with
       the Mossline ground tiles below. -->
  <g fill="#4a7c3a">
    <ellipse cx="40"  cy="395" rx="50" ry="32"/>
    <ellipse cx="120" cy="385" rx="56" ry="36"/>
    <ellipse cx="210" cy="395" rx="48" ry="28"/>
    <ellipse cx="290" cy="380" rx="60" ry="38"/>
    <ellipse cx="380" cy="395" rx="54" ry="30"/>
    <ellipse cx="470" cy="385" rx="58" ry="34"/>
    <ellipse cx="560" cy="395" rx="48" ry="28"/>
    <ellipse cx="640" cy="380" rx="62" ry="36"/>
    <ellipse cx="730" cy="395" rx="52" ry="30"/>
  </g>

  <!-- Canopy under-shadow strokes for depth. -->
  <g fill="#2e5028" opacity="0.55">
    <ellipse cx="120" cy="405" rx="50" ry="14"/>
    <ellipse cx="290" cy="408" rx="52" ry="14"/>
    <ellipse cx="470" cy="408" rx="50" ry="14"/>
    <ellipse cx="640" cy="408" rx="54" ry="14"/>
  </g>

  <!-- Two stylized ruin-stones surfacing through the canopy line. Per
       docs/story/world.md "The Verdant Ruin first leaks out of itself: a few
       stone shoulders surface through the loam." -->
  <g>
    <path d="M 240,350 L 270,330 L 300,340 L 305,360 L 270,365 L 240,358 Z"
          fill="#7a8088" stroke="#3a2e4a" stroke-width="1"/>
    <path d="M 240,350 L 245,345 L 265,338 L 285,343 L 290,355 Z"
          fill="#a8b0b8" opacity="0.7"/>
    <path d="M 530,355 L 555,335 L 590,340 L 605,348 L 605,365 L 575,370 L 540,365 Z"
          fill="#7a8088" stroke="#3a2e4a" stroke-width="1"/>
    <path d="M 530,355 L 540,348 L 565,343 L 585,348 L 595,355 Z"
          fill="#a8b0b8" opacity="0.7"/>
  </g>
</svg>

name: Deploy to GitHub Pages (release/gitpages)

# Pages source is the release/gitpages branch.
# release-master fast-forwards release/gitpages from main on each quartile tag,
# which triggers this workflow to publish.

on:
  push:
    branches: [release/gitpages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Wonder Boy Tribute
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout release/gitpages
        uses: actions/checkout@v4

      - name: Verify game entry points exist
        run: |
          test -f index.html || { echo "ERROR: index.html not found"; exit 1; }
          test -f game.js    || { echo "ERROR: game.js not found";    exit 1; }
          echo "OK: entry points verified"

      - name: Print release summary
        run: |
          echo "=== Wonder Boy Tribute — Release ==="
          echo "Commit : ${{ github.sha }}"
          echo "Actor  : ${{ github.actor }}"
          echo "Date   : $(date -u)"
          echo "Tags reachable from this commit:"
          git tag --contains ${{ github.sha }} || true
          echo "==================================="

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

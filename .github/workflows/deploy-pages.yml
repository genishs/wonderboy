name: Deploy to GitHub Pages (Release)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Wonder Boy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Verify game entry point exists
        run: |
          test -f index.html || { echo "ERROR: index.html not found"; exit 1; }
          test -f game.js    || { echo "ERROR: game.js not found";    exit 1; }
          echo "✓ Game entry points verified"

      - name: Print release summary
        run: |
          echo "=== Wonder Boy Legacy Rebirth — Release ==="
          echo "Commit : ${{ github.sha }}"
          echo "Author : ${{ github.actor }}"
          echo "Date   : $(date -u)"
          echo "Files  :"
          find . -name "*.js" ! -path "*/node_modules/*" | sort
          echo "==========================================="

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

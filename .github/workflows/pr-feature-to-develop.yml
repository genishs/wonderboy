name: "PR Validation"

on:
  pull_request:
    branches: [develop]
  workflow_dispatch:

jobs:
  validate:
    name: Syntax and Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JavaScript syntax
        run: |
          echo "=== JavaScript syntax check ==="
          FAIL=0
          while IFS= read -r f; do
            if node --check "$f"; then
              echo "OK: $f"
            else
              echo "BAD: $f"
              FAIL=1
            fi
          done < <(find . -name "*.js" -not -path "./node_modules/*")
          if [ $FAIL -eq 0 ]; then
            echo "All JS files OK"
          else
            exit 1
          fi

      - name: Verify required file structure
        run: |
          echo "=== File structure check ==="
          files=(
            "index.html"
            "game.js"
            "src/core/GameLoop.js"
            "src/core/ECS.js"
            "src/core/StateManager.js"
            "src/core/InputHandler.js"
            "src/physics/PhysicsEngine.js"
            "src/physics/CollisionSystem.js"
            "src/graphics/Renderer.js"
            "src/graphics/SpriteCache.js"
            "src/levels/LevelManager.js"
            "src/levels/LevelData.js"
            "src/levels/TileMap.js"
            "src/levels/TestStage.js"
            "src/mechanics/GameMechanics.js"
            "src/mechanics/WeaponSystem.js"
            "src/mechanics/HeroController.js"
            "src/mechanics/EnemyAI.js"
            "src/mechanics/StoneflakeSystem.js"
            "src/mechanics/SeeddartSystem.js"
            "src/mechanics/CombatSystem.js"
            "src/config/PhaseOneTunables.js"
            "src/audio/AudioManager.js"
          )
          FAIL=0
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              echo "OK: $f"
            else
              echo "MISSING: $f"
              FAIL=1
            fi
          done
          if [ $FAIL -ne 0 ]; then
            exit 1
          fi

      - name: Guard - no debugger statements
        run: |
          if grep -rn "debugger" src/ --include="*.js"; then
            echo "ERROR: Remove debugger statements before merging."
            exit 1
          fi
          echo "OK: no debugger statements"

      - name: Guard - count console.error
        run: |
          COUNT=$(grep -rn "console\.error" src/ --include="*.js" | wc -l)
          echo "console.error occurrences: $COUNT"
